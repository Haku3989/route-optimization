<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmhouse Route Optimization</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar reveal" style="--i: 0">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <h1>Farmhouse Route Optimization</h1>
          <p>AI delivery planning · real-time ETA · CO₂ reduction</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="segmented" id="sourceToggle" role="tablist" aria-label="Data source">
          <button class="seg active" data-source="history" role="tab" aria-selected="true">
            History
          </button>
          <button class="seg" data-source="presale" role="tab" aria-selected="false">
            Presale
          </button>
          <button class="seg" data-source="sample" role="tab" aria-selected="false">
            Sample plan
          </button>
        </div>
        <a class="btn secondary" href="plan.html">Route planner input</a>
        <a class="btn secondary" href="database.html">Database</a>
        <a class="btn secondary" href="deliveryReport.html">Delivery report</a>
        <a class="btn secondary" href="admin.html">Admin</a>
        <button id="optimizeBtn" class="btn">Optimize routes</button>
      </div>
    </header>

    <form id="historyFilters" class="filter-bar reveal" style="--i: 1">
      <div class="filter-fields">
        <label>DC_Name<select name="DC_Name"><option value="">(any)</option></select></label>
        <label>StoreName<select name="StoreName"><option value="">(any)</option></select></label>
        <label>StoreGroup<select name="StoreGroup"><option value="">(any)</option></select></label>
        <label>Store Area<select name="Store Area"><option value="">(any)</option></select></label>
        <label>CustomerType<select name="CustomerType"><option value="">(any)</option></select></label>
        <label
          >Day<select id="historyDay" name="Day"><option value="">(choose a day)</option></select></label
        >
      </div>
      <div class="filter-actions">
        <button type="submit" class="btn">Apply filters</button>
        <button type="button" id="clearFilters" class="btn secondary">Clear</button>
      </div>
    </form>

    <form id="presaleFilters" class="filter-bar" hidden>
      <div class="filter-fields">
        <label>DC_Name<select name="DC_Name"><option value="">(any)</option></select></label>
        <label>StoreName<select name="StoreName"><option value="">(any)</option></select></label>
        <label>StoreGroup<select name="StoreGroup"><option value="">(any)</option></select></label>
        <label>Store Area<select name="Store Area"><option value="">(any)</option></select></label>
        <label>CustomerType<select name="CustomerType"><option value="">(any)</option></select></label>
        <label>Delivery date<input type="date" name="DELIVERY_DATE" /></label>
      </div>
      <div class="filter-actions">
        <button type="submit" class="btn">Apply filters</button>
        <button type="button" id="clearPresaleFilters" class="btn secondary">Clear</button>
      </div>
    </form>

    <section class="metrics reveal" id="metrics" style="--i: 2">
      <!-- metric cards injected here -->
    </section>

    <main class="layout reveal" style="--i: 3">
      <div id="map"></div>
      <aside class="sidebar" id="routes">
        <p class="hint">Loading history-based optimization…</p>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
